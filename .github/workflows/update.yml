name: Atualizar Dados IBOV

on:
  schedule:
    # Seg a sex às 22:00 UTC (19:00 BRT) — após fechamento B3
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests numpy pandas yfinance

      - name: Rodar script
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}   # opcional — deixar em branco funciona
        run: python update_data.py

      - name: Commit dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "dados: IBOV $(date -u +%Y-%m-%d)"
          git push
